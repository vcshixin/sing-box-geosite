name: Config Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        # 保证后续 git push 用到有写权限的 token
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup sing-box
      env:
        SING_BOX_DEB_URL: "https://github.com/SagerNet/sing-box/releases/download/v1.10.0-alpha.27/sing-box_1.10.0-alpha.27_linux_amd64.deb"
      run: |
        set -Eeuo pipefail
        wget -O sing-box.deb "$SING_BOX_DEB_URL"
        sudo dpkg -i sing-box.deb

    - name: Set up Python3
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests pyyaml

    - name: Download content
      run: |
        URL="https://raw.githubusercontent.com/Cats-Team/AdRules/main/dns.txt"
        OUTPUT_FILE="./rule/AdRules.txt"
        curl -L "$URL" -o "$OUTPUT_FILE"
        if [ -f "$OUTPUT_FILE" ]; then
          echo "Download successful: $OUTPUT_FILE"
        else
          echo "Download failed."
          exit 1
        fi

    - name: Convert AdRules DNS List to sing-box rule set
      run: |
        sing-box rule-set convert --type adguard --output ./rule/AdRules.srs ./rule/AdRules.txt

    - name: Run script
      run: python ../main.py
      working-directory: ./rule/

    - name: Commit and push rules
      run: |
        set -Eeuo pipefail
        git config user.email "action@github.com"
        git config user.name "GitHub Action"

        git add ./rule/*.json ./rule/*.srs ./rule/*.txt || true

        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "Update rules"

        # 远端可能在本次 job 期间有新提交：先 rebase 再推，避免 rejected
        for i in 1 2 3; do
          git fetch origin main
          if git pull --rebase origin main; then
            if git push origin HEAD:main; then
              echo "Push ok"
              exit 0
            fi
          fi
          echo "Push/rebase conflict attempt $i, retry..."
          git rebase --abort 2>/dev/null || true
          sleep 3
        done

        echo "Failed to push after retries"
        exit 1
